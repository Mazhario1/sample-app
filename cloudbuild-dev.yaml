steps:
- name: gcr.io/cloud-builders/docker
  id: Build development image
  args:
  - build
  - -t
  - us-east1-docker.pkg.dev/qwiklabs-gcp-04-cf856ac77b68/my-repository/hello-cloudbuild-dev:v2.0
  - .

- name: gcr.io/cloud-builders/docker
  id: Push development image
  args:
  - push
  - us-east1-docker.pkg.dev/qwiklabs-gcp-04-cf856ac77b68/my-repository/hello-cloudbuild-dev:v2.0

- name: gcr.io/cloud-builders/kubectl
  id: Deploy development
  args:
  - apply
  - -f
  - dev/deployment.yaml
  env:
  - CLOUDSDK_COMPUTE_ZONE=us-east1-b
  - CLOUDSDK_CONTAINER_CLUSTER=hello-cluster

images:
- us-east1-docker.pkg.dev/qwiklabs-gcp-04-cf856ac77b68/my-repository/hello-cloudbuild-dev:v2.0

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
