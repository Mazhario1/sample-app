apiVersion: apps/v1
kind: Deployment
metadata:
  name: development-deployment
  namespace: dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app: development-deployment
  template:
    metadata:
      labels:
        app: development-deployment
    spec:
      containers:
      - name: hello-cloudbuild-dev
        image: us-east1-docker.pkg.dev/qwiklabs-gcp-04-cf856ac77b68/my-repository/hello-cloudbuild:v1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
